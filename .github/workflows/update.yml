name: Update Model IDs

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download cached models.json (for fallback + diff baseline)
        # Download the live models.json so failed providers can fall back to it.
        # Ignore errors on first run (no page deployed yet).
        continue-on-error: true
        env:
          PAGES_OWNER: ${{ github.repository_owner }}
          PAGES_REPO: ${{ github.event.repository.name }}
        run: |
          mkdir -p dist
          curl -fsSL "https://${PAGES_OWNER}.github.io/${PAGES_REPO}/models.json" \
            -o dist/models.json \
            --max-time 30 \
          || echo "No cached models.json found (first run or fetch failed)"

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: bun run src/main.ts --force

      - name: Commit models.json snapshot (history + keepalive)
        # Persist the freshly built models.json into the tracked data/ dir.
        # This gives a diffable history AND counts as repo activity, which
        # stops GitHub from auto-disabling this scheduled workflow after
        # 60 days of inactivity (the reason it stalled before).
        run: |
          mkdir -p data
          cp dist/models.json data/models.json
          git add data/models.json
          if git diff --cached --quiet; then
            echo "models.json unchanged; nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update models.json snapshot [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
